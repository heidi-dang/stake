<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORK_ENGINE | Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b0e14; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: #1a202c; border: 1px solid #2d3748; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 max-w-2xl mx-auto">

    <header class="mb-6">
        <h1 class="text-2xl font-black text-blue-500 mb-4">GORK_TERMINAL</h1>
        <div class="flex border-b border-slate-700">
            <button onclick="switchTab('tab-wallet')" id="btn-wallet" class="tab-btn active px-4 py-2 text-sm font-bold text-slate-400">1. WALLET</button>
            <button onclick="switchTab('tab-bot')" id="btn-bot" class="tab-btn px-4 py-2 text-sm font-bold text-slate-400">2. STRATEGY</button>
            <button onclick="switchTab('tab-logs')" id="btn-logs" class="tab-btn px-4 py-2 text-sm font-bold text-slate-400">3. MONITOR</button>
        </div>
    </header>

    <div id="tab-wallet" class="tab-content active space-y-4">
        <div class="glass p-4 rounded-xl">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xs font-bold uppercase text-slate-500">Connection</h3>
                <span id="health-badge" class="px-2 py-0.5 text-[10px] font-bold rounded bg-slate-800 text-slate-400">DISCONNECTED</span>
            </div>
            <div class="flex gap-2">
                <input id="api-key" type="password" placeholder="Stake API Key..." class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm">
                <button onclick="saveApi()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-bold transition">CONNECT</button>
            </div>
        </div>

        <div class="glass p-4 rounded-xl text-center">
            <p class="text-[10px] text-slate-500 uppercase">Active Balance</p>
            <h2 id="main-bal" class="text-4xl font-mono font-bold text-green-400">$0.00</h2>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-xl">
                <h3 class="text-xs font-bold uppercase text-slate-500 mb-2">All Balances</h3>
                <select id="wallet-dropdown" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm font-mono"></select>
            </div>
            <div class="glass p-4 rounded-xl">
                <h3 class="text-xs font-bold uppercase text-slate-500 mb-2">Bonuses</h3>
                <div class="flex justify-between text-sm mb-1"><span class="text-slate-400">Rakeback:</span><span id="rb-val" class="font-bold">$0.00</span></div>
                <div class="flex justify-between text-sm mb-3"><span class="text-slate-400">Reload:</span><span id="rl-val" class="font-bold">$0.00</span></div>
                <button class="w-full bg-slate-800 text-blue-400 border border-blue-500/30 rounded py-1 text-xs font-bold hover:bg-blue-900 transition">CLAIM ALL</button>
            </div>
        </div>
    </div>

    <div id="tab-bot" class="tab-content space-y-4">
        <div class="glass p-4 rounded-xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold uppercase text-slate-500">Engine Parameters</h3>
                <button onclick="toggleBot()" id="bot-toggle-btn" class="bg-blue-600 px-4 py-1 rounded text-xs font-bold">START BOT</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] text-slate-400 uppercase">Base Bet ($)</label>
                    <input id="set-bet" type="number" value="1.0" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase">Win Chance (%)</label>
                    <input id="set-chance" type="number" value="99.0" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase">Vault Floor ($)</label>
                    <input id="set-vault" type="number" value="1000" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 uppercase">Target Wager ($)</label>
                    <input id="set-target" type="number" value="132500" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm">
                </div>
            </div>
            <button onclick="saveSettings()" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-2 rounded-lg text-sm font-bold transition border border-slate-600">SAVE SETTINGS</button>
        </div>

        <div class="glass p-4 rounded-xl border-l-4 border-l-purple-500">
            <h3 class="text-xs font-bold uppercase text-slate-500 mb-3">Strategy Simulator</h3>
            <div class="flex gap-2 mb-3">
                <input id="sim-bets" type="number" placeholder="Simulate N Bets (e.g. 1000)" class="flex-1 bg-slate-900 border border-slate-700 rounded p-2 text-sm">
                <button onclick="runSim()" class="bg-purple-600 hover:bg-purple-500 px-4 rounded text-sm font-bold">RUN TEST</button>
            </div>
            <div id="sim-results" class="hidden grid-cols-3 gap-2 text-center text-sm font-mono bg-slate-900 p-2 rounded">
                <div><p class="text-[9px] text-slate-500">Wagered</p><span id="sim-w"></span></div>
                <div><p class="text-[9px] text-slate-500">PnL</p><span id="sim-pnl"></span></div>
                <div><p class="text-[9px] text-slate-500">W / L</p><span id="sim-wl"></span></div>
            </div>
        </div>
    </div>

    <div id="tab-logs" class="tab-content space-y-4">
        <div class="glass p-4 rounded-xl">
            <h3 class="text-xs font-bold uppercase text-slate-500 mb-2">Live Volume Chart</h3>
            <canvas id="volumeChart" height="150"></canvas>
        </div>
        <div class="glass p-4 rounded-xl">
            <h3 class="text-xs font-bold uppercase text-slate-500 mb-2 flex justify-between">
                System Terminal <span id="sess-wagered" class="text-blue-400 font-mono">Vol: $0.00</span>
            </h3>
            <div id="terminal" class="h-48 overflow-y-auto bg-slate-900 border border-slate-800 rounded p-2 font-mono text-[10px] text-slate-400 space-y-1">
                </div>
        </div>
    </div>

    <script>
        // Tab Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // Chart Setup
        const ctx = document.getElementById('volumeChart').getContext('2d');
        const volChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ label: 'Wagered', data: [], borderColor: '#3b82f6', tension: 0.4, borderWidth: 2 }] },
            options: { responsive: true, scales: { x: { display: false }, y: { grid: { color: '#1e293b' } } }, plugins: { legend: { display: false } } }
        });

        // Backend Communication
        let isRunning = false;

        async function fetchState() {
            const res = await fetch('/api/data');
            const data = await res.json();
            
            // Tab 1 Updates
            document.getElementById('health-badge').innerText = data.health;
            document.getElementById('health-badge').className = data.health === 'CONNECTED' ? 'px-2 py-0.5 text-[10px] font-bold rounded bg-green-500/20 text-green-400' : 'px-2 py-0.5 text-[10px] font-bold rounded bg-red-500/20 text-red-400';
            document.getElementById('main-bal').innerText = `$${data.stats.balance.toFixed(2)}`;
            document.getElementById('rb-val').innerText = `$${data.wallet.bonuses.rakeback}`;
            document.getElementById('rl-val').innerText = `$${data.wallet.bonuses.reload}`;
            
            const drop = document.getElementById('wallet-dropdown');
            if (drop.options.length === 0) {
                drop.innerHTML = Object.entries(data.wallet.balances).map(([c, a]) => `<option>${c.toUpperCase()} - ${a}</option>`).join('');
            }

            // Tab 2 Updates (Status)
            isRunning = data.bot.is_running;
            const btn = document.getElementById('bot-toggle-btn');
            btn.innerText = isRunning ? "STOP BOT" : "START BOT";
            btn.className = isRunning ? "bg-red-600 px-4 py-1 rounded text-xs font-bold" : "bg-blue-600 px-4 py-1 rounded text-xs font-bold";

            // Tab 3 Updates
            document.getElementById('sess-wagered').innerText = `Vol: $${data.stats.wagered.toFixed(2)}`;
            document.getElementById('terminal').innerHTML = data.logs.map(l => `<div>${l}</div>`).join('');
            
            // Update Chart
            volChart.data.datasets[0].data = data.chart_data;
            volChart.update();
        }

        async function saveApi() {
            await fetch('/api/health', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ api_key: document.getElementById('api-key').value })
            });
            fetchState();
        }

        async function saveSettings() {
            await fetch('/api/settings', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    base_bet: parseFloat(document.getElementById('set-bet').value),
                    win_chance: parseFloat(document.getElementById('set-chance').value),
                    vault_floor: parseFloat(document.getElementById('set-vault').value),
                    target: parseFloat(document.getElementById('set-target').value)
                })
            });
        }

        async function toggleBot() {
            await fetch('/api/settings', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ is_running: !isRunning })
            });
            fetchState();
        }

        async function runSim() {
            const res = await fetch('/api/simulate', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    sim_bets: document.getElementById('sim-bets').value,
                    sim_chance: document.getElementById('set-chance').value,
                    sim_bet_size: document.getElementById('set-bet').value
                })
            });
            const data = await res.json();
            document.getElementById('sim-results').style.display = 'grid';
            document.getElementById('sim-w').innerText = `$${data.wagered}`;
            document.getElementById('sim-pnl').innerText = `$${data.profit.toFixed(2)}`;
            document.getElementById('sim-pnl').className = data.profit >= 0 ? "text-green-400" : "text-red-400";
            document.getElementById('sim-wl').innerText = `${data.wins}/${data.losses}`;
        }

        setInterval(fetchState, 1000);
        fetchState();
    </script>
</body>
</html>
